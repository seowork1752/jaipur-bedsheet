version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: jaipur-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: jaipur-bedsheets
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - jaipur-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jaipur-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/jaipur-bedsheets?authSource=admin
      JWT_SECRET: your_jwt_secret_key_here_min_32_chars
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      FRONTEND_URL: http://localhost:3000
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
    networks:
      - jaipur-network
    command: npm run dev

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jaipur-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
      NEXT_PUBLIC_RAZORPAY_KEY: ${NEXT_PUBLIC_RAZORPAY_KEY}
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
    networks:
      - jaipur-network
    command: npm run dev

  # Redis Cache (Optional)
  redis:
    image: redis:7-alpine
    container_name: jaipur-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - jaipur-network
    command: redis-server --appendonly yes

  # Mailhog for Email Testing
  mailhog:
    image: mailhog/mailhog:latest
    container_name: jaipur-mailhog
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    networks:
      - jaipur-network

volumes:
  mongodb_data:
  mongodb_config:
  redis_data:

networks:
  jaipur-network:
    driver: bridge
